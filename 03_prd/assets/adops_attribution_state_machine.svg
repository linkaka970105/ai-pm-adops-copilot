<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AdOps Copilot 投放归因排障智能体状态机图</title>
  <desc id="desc">展示排障智能体从接收问题到检索、工具执行、诊断、安全检查、交付、人工审核和回流的状态变化。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#101828" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 28px "Microsoft YaHei", Arial, sans-serif; fill: #101828; }
      .subtitle { font: 400 14px "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .state { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .start { fill: #eff8ff; stroke: #84caff; }
      .work { fill: #f5f3ff; stroke: #c4b5fd; }
      .safe { fill: #fff7ed; stroke: #fdba74; }
      .done { fill: #ecfdf3; stroke: #86efac; }
      .risk { fill: #fef3f2; stroke: #fda29b; }
      .label { font: 700 16px "Microsoft YaHei", Arial, sans-serif; fill: #101828; }
      .small { font: 400 12px "Microsoft YaHei", Arial, sans-serif; fill: #475467; }
      .arrow { stroke: #344054; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .alt { stroke: #667085; stroke-width: 1.6; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .note { font: 400 12px "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#ffffff"/>
  <text x="48" y="54" class="title">AdOps Copilot 投放归因排障智能体状态机</text>
  <text x="48" y="80" class="subtitle">状态机用于约束 Agent 不能自由跳步：必须先校验权限、检索证据和执行安全检查，再交付诊断结果。</text>

  <rect x="70" y="128" width="150" height="64" class="state start"/>
  <text x="145" y="154" text-anchor="middle" class="label">已接收</text>
  <text x="145" y="174" text-anchor="middle" class="small">创建会话</text>

  <rect x="280" y="128" width="150" height="64" class="state work"/>
  <text x="355" y="154" text-anchor="middle" class="label">意图识别中</text>
  <text x="355" y="174" text-anchor="middle" class="small">类型 / 风险 / 实体</text>

  <rect x="490" y="128" width="150" height="64" class="state work"/>
  <text x="565" y="154" text-anchor="middle" class="label">检索中</text>
  <text x="565" y="174" text-anchor="middle" class="small">SOP / 口径 / 案例</text>

  <rect x="700" y="128" width="150" height="64" class="state work"/>
  <text x="775" y="154" text-anchor="middle" class="label">工具规划中</text>
  <text x="775" y="174" text-anchor="middle" class="small">只读计划</text>

  <rect x="910" y="128" width="150" height="64" class="state work"/>
  <text x="985" y="154" text-anchor="middle" class="label">工具执行中</text>
  <text x="985" y="174" text-anchor="middle" class="small">报表 / 归因</text>

  <rect x="910" y="292" width="150" height="64" class="state work"/>
  <text x="985" y="318" text-anchor="middle" class="label">证据汇总中</text>
  <text x="985" y="338" text-anchor="middle" class="small">Evidence Object</text>

  <rect x="700" y="292" width="150" height="64" class="state work"/>
  <text x="775" y="318" text-anchor="middle" class="label">诊断生成中</text>
  <text x="775" y="338" text-anchor="middle" class="small">结论 / 建议</text>

  <rect x="490" y="292" width="150" height="64" class="state safe"/>
  <text x="565" y="318" text-anchor="middle" class="label">安全检查中</text>
  <text x="565" y="338" text-anchor="middle" class="small">越权 / 无证据</text>

  <rect x="280" y="292" width="150" height="64" class="state done"/>
  <text x="355" y="318" text-anchor="middle" class="label">可交付</text>
  <text x="355" y="338" text-anchor="middle" class="small">诊断卡 / 核查卡</text>

  <rect x="70" y="292" width="150" height="64" class="state done"/>
  <text x="145" y="318" text-anchor="middle" class="label">已反馈</text>
  <text x="145" y="338" text-anchor="middle" class="small">采纳 / 无效</text>

  <rect x="70" y="486" width="160" height="64" class="state risk"/>
  <text x="150" y="512" text-anchor="middle" class="label">待用户补充</text>
  <text x="150" y="532" text-anchor="middle" class="small">缺少字段</text>

  <rect x="340" y="486" width="160" height="64" class="state risk"/>
  <text x="420" y="512" text-anchor="middle" class="label">权限拒绝</text>
  <text x="420" y="532" text-anchor="middle" class="small">越权或敏感数据</text>

  <rect x="610" y="486" width="160" height="64" class="state risk"/>
  <text x="690" y="512" text-anchor="middle" class="label">人工审核</text>
  <text x="690" y="532" text-anchor="middle" class="small">高风险判断</text>

  <rect x="880" y="486" width="170" height="64" class="state done"/>
  <text x="965" y="512" text-anchor="middle" class="label">Badcase 回流</text>
  <text x="965" y="532" text-anchor="middle" class="small">知识 / Prompt / 评测</text>

  <rect x="1110" y="292" width="130" height="64" class="state done"/>
  <text x="1175" y="318" text-anchor="middle" class="label">完成</text>
  <text x="1175" y="338" text-anchor="middle" class="small">Trace 关闭</text>

  <path d="M220 160 H280" class="arrow"/>
  <path d="M430 160 H490" class="arrow"/>
  <path d="M640 160 H700" class="arrow"/>
  <path d="M850 160 H910" class="arrow"/>
  <path d="M985 192 V292" class="arrow"/>
  <path d="M910 324 H850" class="arrow"/>
  <path d="M700 324 H640" class="arrow"/>
  <path d="M490 324 H430" class="arrow"/>
  <path d="M280 324 H220" class="arrow"/>
  <path d="M220 324 H280" class="alt"/>
  <path d="M145 356 V486" class="alt"/>
  <path d="M775 192 C775 440 420 440 420 486" class="alt"/>
  <path d="M565 356 C565 430 690 430 690 486" class="alt"/>
  <path d="M145 356 C145 620 965 620 965 550" class="arrow"/>
  <path d="M965 486 C965 420 355 420 355 356" class="alt"/>
  <path d="M430 324 H490" class="alt"/>
  <path d="M1060 324 H1110" class="arrow"/>

  <text x="236" y="612" class="note">虚线表示异常或人工分支；实线表示主流程。所有高风险分支必须写入 Trace 并进入可复盘状态。</text>
</svg>
