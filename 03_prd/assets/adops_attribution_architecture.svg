<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="840" viewBox="0 0 1280 840" role="img" aria-labelledby="title desc">
  <title id="title">AdOps Copilot 投放归因排障系统架构图</title>
  <desc id="desc">展示英文业务前台、AI 工作流中台、数据知识层、治理运营后台之间的架构关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#101828" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 28px "Microsoft YaHei", Arial, sans-serif; fill: #101828; }
      .subtitle { font: 400 14px "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .layer-title { font: 700 18px "Microsoft YaHei", Arial, sans-serif; fill: #101828; }
      .label { font: 700 15px "Microsoft YaHei", Arial, sans-serif; fill: #101828; }
      .small { font: 400 12px "Microsoft YaHei", Arial, sans-serif; fill: #475467; }
      .layer { fill: #f9fafb; stroke: #e4e7ec; stroke-width: 1.5; rx: 20; }
      .card { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.2; rx: 12; filter: url(#shadow); }
      .front { fill: #eff8ff; stroke: #84caff; }
      .ai { fill: #f5f3ff; stroke: #c4b5fd; }
      .data { fill: #ecfdf3; stroke: #86efac; }
      .ops { fill: #fff7ed; stroke: #fdba74; }
      .arrow { stroke: #344054; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .sync { stroke: #667085; stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1280" height="840" fill="#ffffff"/>
  <text x="48" y="54" class="title">AdOps Copilot 投放归因排障系统架构</text>
  <text x="48" y="80" class="subtitle">第一阶段架构重点：英文业务入口、AI 工作流中台、投放归因数据与知识层、治理运营后台。</text>

  <rect x="52" y="120" width="1176" height="140" class="layer"/>
  <text x="76" y="152" class="layer-title">英文业务前台</text>
  <rect x="92" y="180" width="190" height="52" class="card front"/>
  <text x="187" y="202" text-anchor="middle" class="label">Copilot Chat</text>
  <text x="187" y="220" text-anchor="middle" class="small">自然语言排障入口</text>
  <rect x="332" y="180" width="190" height="52" class="card front"/>
  <text x="427" y="202" text-anchor="middle" class="label">Campaign 侧边栏</text>
  <text x="427" y="220" text-anchor="middle" class="small">带业务上下文提问</text>
  <rect x="572" y="180" width="190" height="52" class="card front"/>
  <text x="667" y="202" text-anchor="middle" class="label">诊断结果卡</text>
  <text x="667" y="220" text-anchor="middle" class="small">投放异常结论</text>
  <rect x="812" y="180" width="190" height="52" class="card front"/>
  <text x="907" y="202" text-anchor="middle" class="label">归因核查卡</text>
  <text x="907" y="220" text-anchor="middle" class="small">口径与差异清单</text>
  <rect x="1052" y="180" width="140" height="52" class="card front"/>
  <text x="1122" y="202" text-anchor="middle" class="label">反馈入口</text>
  <text x="1122" y="220" text-anchor="middle" class="small">采纳 / Badcase</text>

  <rect x="52" y="300" width="1176" height="180" class="layer"/>
  <text x="76" y="332" class="layer-title">AI 工作流中台</text>
  <rect x="92" y="360" width="160" height="62" class="card ai"/>
  <text x="172" y="384" text-anchor="middle" class="label">总控智能体</text>
  <text x="172" y="404" text-anchor="middle" class="small">意图 / 实体 / 风险</text>
  <rect x="292" y="360" width="160" height="62" class="card ai"/>
  <text x="372" y="384" text-anchor="middle" class="label">投放诊断</text>
  <text x="372" y="404" text-anchor="middle" class="small">指标拆解与原因排序</text>
  <rect x="492" y="360" width="160" height="62" class="card ai"/>
  <text x="572" y="384" text-anchor="middle" class="label">归因核对</text>
  <text x="572" y="404" text-anchor="middle" class="small">窗口 / 时区 / 去重</text>
  <rect x="692" y="360" width="160" height="62" class="card ai"/>
  <text x="772" y="384" text-anchor="middle" class="label">模型路由</text>
  <text x="772" y="404" text-anchor="middle" class="small">轻量 / 推理 / Judge</text>
  <rect x="892" y="360" width="160" height="62" class="card ai"/>
  <text x="972" y="384" text-anchor="middle" class="label">工具计划</text>
  <text x="972" y="404" text-anchor="middle" class="small">参数模板与权限</text>
  <rect x="1092" y="360" width="100" height="62" class="card ai"/>
  <text x="1142" y="384" text-anchor="middle" class="label">Trace</text>
  <text x="1142" y="404" text-anchor="middle" class="small">审计</text>

  <rect x="52" y="520" width="1176" height="150" class="layer"/>
  <text x="76" y="552" class="layer-title">数据与知识层</text>
  <rect x="92" y="580" width="170" height="52" class="card data"/>
  <text x="177" y="602" text-anchor="middle" class="label">广告报表</text>
  <text x="177" y="620" text-anchor="middle" class="small">指标序列与对比</text>
  <rect x="302" y="580" width="170" height="52" class="card data"/>
  <text x="387" y="602" text-anchor="middle" class="label">账户状态</text>
  <text x="387" y="620" text-anchor="middle" class="small">预算 / 余额 / 投放</text>
  <rect x="512" y="580" width="170" height="52" class="card data"/>
  <text x="597" y="602" text-anchor="middle" class="label">MMP / 归因</text>
  <text x="597" y="620" text-anchor="middle" class="small">事件与窗口口径</text>
  <rect x="722" y="580" width="170" height="52" class="card data"/>
  <text x="807" y="602" text-anchor="middle" class="label">Postback 状态</text>
  <text x="807" y="620" text-anchor="middle" class="small">成功 / 失败 / 延迟</text>
  <rect x="932" y="580" width="260" height="52" class="card data"/>
  <text x="1062" y="602" text-anchor="middle" class="label">SOP / 指标口径 / 历史案例</text>
  <text x="1062" y="620" text-anchor="middle" class="small">Hybrid Search + Rerank</text>

  <rect x="52" y="710" width="1176" height="90" class="layer"/>
  <text x="76" y="742" class="layer-title">治理与运营后台</text>
  <rect x="260" y="742" width="170" height="38" class="card ops"/>
  <text x="345" y="766" text-anchor="middle" class="label">知识库管理</text>
  <rect x="470" y="742" width="170" height="38" class="card ops"/>
  <text x="555" y="766" text-anchor="middle" class="label">Badcase 管理</text>
  <rect x="680" y="742" width="170" height="38" class="card ops"/>
  <text x="765" y="766" text-anchor="middle" class="label">评测集管理</text>
  <rect x="890" y="742" width="170" height="38" class="card ops"/>
  <text x="975" y="766" text-anchor="middle" class="label">灰度与监控</text>

  <path d="M640 260 V300" class="arrow"/>
  <path d="M640 480 V520" class="arrow"/>
  <path d="M640 670 V710" class="sync"/>
  <path d="M1052 761 C1160 700 1190 470 1142 422" class="sync"/>
  <path d="M260 391 H292" class="arrow"/>
  <path d="M452 391 H492" class="arrow"/>
  <path d="M652 391 H692" class="arrow"/>
  <path d="M852 391 H892" class="arrow"/>
  <path d="M1052 391 H1092" class="arrow"/>
</svg>
