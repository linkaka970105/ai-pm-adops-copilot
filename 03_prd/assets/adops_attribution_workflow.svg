<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AdOps Copilot 投放归因排障端到端业务流程图</title>
  <desc id="desc">展示从用户输入问题到权限校验、知识检索、工具执行、诊断生成、反馈回流的完整流程。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#101828" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 28px "Microsoft YaHei", Arial, sans-serif; fill: #101828; }
      .subtitle { font: 400 14px "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .box { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .box-blue { fill: #eff8ff; stroke: #84caff; }
      .box-green { fill: #ecfdf3; stroke: #86efac; }
      .box-orange { fill: #fff7ed; stroke: #fdba74; }
      .box-purple { fill: #f5f3ff; stroke: #c4b5fd; }
      .label { font: 700 17px "Microsoft YaHei", Arial, sans-serif; fill: #101828; }
      .small { font: 400 13px "Microsoft YaHei", Arial, sans-serif; fill: #475467; }
      .arrow { stroke: #344054; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .lane { fill: #f9fafb; stroke: #eaecf0; stroke-width: 1; rx: 18; }
      .lane-title { font: 700 15px "Microsoft YaHei", Arial, sans-serif; fill: #344054; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="48" y="54" class="title">AdOps Copilot 投放归因排障端到端流程</text>
  <text x="48" y="80" class="subtitle">第一阶段聚焦：投放效果异常诊断、归因与数据不一致核对、知识检索、证据归一和 Badcase 回流。</text>

  <rect x="40" y="112" width="1200" height="128" class="lane"/>
  <text x="64" y="142" class="lane-title">入口与总控</text>
  <rect x="70" y="166" width="160" height="52" class="box box-blue"/>
  <text x="150" y="188" text-anchor="middle" class="label">问题输入</text>
  <text x="150" y="207" text-anchor="middle" class="small">Chat / Campaign / 工单</text>
  <rect x="285" y="166" width="180" height="52" class="box box-blue"/>
  <text x="375" y="188" text-anchor="middle" class="label">会话创建</text>
  <text x="375" y="207" text-anchor="middle" class="small">记录入口与上下文</text>
  <rect x="520" y="166" width="190" height="52" class="box box-blue"/>
  <text x="615" y="188" text-anchor="middle" class="label">身份与权限校验</text>
  <text x="615" y="207" text-anchor="middle" class="small">角色 / 账户 / 区域</text>
  <rect x="765" y="166" width="190" height="52" class="box box-blue"/>
  <text x="860" y="188" text-anchor="middle" class="label">意图与实体识别</text>
  <text x="860" y="207" text-anchor="middle" class="small">metric / campaign / MMP</text>
  <rect x="1010" y="166" width="180" height="52" class="box box-blue"/>
  <text x="1100" y="188" text-anchor="middle" class="label">风险分级</text>
  <text x="1100" y="207" text-anchor="middle" class="small">低 / 中 / 高风险</text>

  <path d="M230 192 H285" class="arrow"/>
  <path d="M465 192 H520" class="arrow"/>
  <path d="M710 192 H765" class="arrow"/>
  <path d="M955 192 H1010" class="arrow"/>

  <rect x="40" y="276" width="1200" height="160" class="lane"/>
  <text x="64" y="306" class="lane-title">检索、工具与证据</text>
  <rect x="70" y="332" width="190" height="64" class="box box-green"/>
  <text x="165" y="354" text-anchor="middle" class="label">任务拆解</text>
  <text x="165" y="374" text-anchor="middle" class="small">投放诊断 / 归因核对</text>
  <rect x="318" y="332" width="190" height="64" class="box box-green"/>
  <text x="413" y="354" text-anchor="middle" class="label">知识检索</text>
  <text x="413" y="374" text-anchor="middle" class="small">SOP / 指标 / 归因口径</text>
  <rect x="566" y="332" width="190" height="64" class="box box-green"/>
  <text x="661" y="354" text-anchor="middle" class="label">工具调用计划</text>
  <text x="661" y="374" text-anchor="middle" class="small">只读参数模板</text>
  <rect x="814" y="332" width="190" height="64" class="box box-green"/>
  <text x="909" y="354" text-anchor="middle" class="label">工具网关执行</text>
  <text x="909" y="374" text-anchor="middle" class="small">报表 / 账户 / MMP</text>
  <rect x="1062" y="332" width="150" height="64" class="box box-green"/>
  <text x="1137" y="354" text-anchor="middle" class="label">证据归一</text>
  <text x="1137" y="374" text-anchor="middle" class="small">Evidence Object</text>

  <path d="M1100 218 C1100 258 165 258 165 332" class="arrow"/>
  <path d="M260 364 H318" class="arrow"/>
  <path d="M508 364 H566" class="arrow"/>
  <path d="M756 364 H814" class="arrow"/>
  <path d="M1004 364 H1062" class="arrow"/>

  <rect x="40" y="472" width="1200" height="156" class="lane"/>
  <text x="64" y="502" class="lane-title">诊断、交付与回流</text>
  <rect x="70" y="530" width="190" height="64" class="box box-orange"/>
  <text x="165" y="552" text-anchor="middle" class="label">诊断生成</text>
  <text x="165" y="572" text-anchor="middle" class="small">结论 / 置信度 / 建议</text>
  <rect x="318" y="530" width="190" height="64" class="box box-orange"/>
  <text x="413" y="552" text-anchor="middle" class="label">安全检查</text>
  <text x="413" y="572" text-anchor="middle" class="small">无证据 / 越权 / 高风险</text>
  <rect x="566" y="530" width="190" height="64" class="box box-orange"/>
  <text x="661" y="552" text-anchor="middle" class="label">结果展示</text>
  <text x="661" y="572" text-anchor="middle" class="small">诊断卡 / 核查卡</text>
  <rect x="814" y="530" width="190" height="64" class="box box-purple"/>
  <text x="909" y="552" text-anchor="middle" class="label">用户反馈</text>
  <text x="909" y="572" text-anchor="middle" class="small">采纳 / 无效 / 部分有效</text>
  <rect x="1062" y="530" width="150" height="64" class="box box-purple"/>
  <text x="1137" y="552" text-anchor="middle" class="label">Badcase 回流</text>
  <text x="1137" y="572" text-anchor="middle" class="small">知识 / Prompt / 评测</text>

  <path d="M1137 396 C1137 450 165 450 165 530" class="arrow"/>
  <path d="M260 562 H318" class="arrow"/>
  <path d="M508 562 H566" class="arrow"/>
  <path d="M756 562 H814" class="arrow"/>
  <path d="M1004 562 H1062" class="arrow"/>
</svg>
